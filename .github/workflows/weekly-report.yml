name: Weekly GA4/GSC Report

on:
  schedule:
    - cron: "0 9 * * 1"
      timezone: "Asia/Tokyo"
  workflow_dispatch: {}

permissions:
  contents: write
  id-token: write

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/609779181922/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "aizen-report-bot@aizen-marketing-report.iam.gserviceaccount.com"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send weekly report
        working-directory: src
        env:
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
          GOOGLE_CHAT_WEBHOOK_URL: ${{ secrets.GOOGLE_CHAT_WEBHOOK_URL }}
          GITHUB_PAGES_BASE_URL: "https://khirai-coder.github.io/aizen-marketing-agent"
        run: python main.py

      - name: Publish chart to GitHub Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/latest.png
          if ! git diff --cached --quiet; then
            git commit -m "Update weekly report chart"
            git push
          fi
