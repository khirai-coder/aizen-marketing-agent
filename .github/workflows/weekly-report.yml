name: Weekly GA4/GSC Report

on:
  schedule:
    - cron: "0 9 * * 1"
      timezone: "Asia/Tokyo"
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/933804246557/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "aizen-report-bot@aizen-marketing-report.iam.gserviceaccount.com"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send weekly report
        working-directory: src
        env:
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
          GOOGLE_CHAT_WEBHOOK_URL: ${{ secrets.GOOGLE_CHAT_WEBHOOK_URL }}
        run: python main.py
